    {\displaystyle \eta _{c}} of 0.7, a rocket flying at Mach 0.85 (which most aircraft cruise at) with an exhaust velocity of Mach 10, would have a predicted overall energy efficiency of 5.9%, whereas a conventional, modern, air-breathing jet engine achieves closer to 35% efficiency. Thus a rocket would need about 6× more energy; and allowing for the specific energy of rocket propellant being around one third that of conventional air fuel, roughly 18× more mass of propellant would need to be carried for the same journey. This is why rockets are rarely if ever used for general aviation.

    Since the energy ultimately comes from fuel, these considerations mean that rockets are mainly useful when a very high speed is required, such as ICBMs or orbital launch. For example, NASA's Space Shuttle fired its engines for around 8.5 minutes, consuming 1,000 tonnes of solid propellant (containing 16% aluminium) and an additional 2,000,000 litres of liquid propellant (106,261 kg of liquid hydrogen fuel) to lift the 100,000 kg vehicle (including the 25,000 kg payload) to an altitude of 111 km and an orbital velocity of 30,000 km/h. At this altitude and velocity, the vehicle had a kinetic energy of about 3 TJ and a potential energy of roughly 200 GJ. Given the initial energy of 20 TJ,[nb 4] the Space Shuttle was about 16% energy efficient at launching the orbiter.

    Thus jet engines, with a better match between speed and jet exhaust speed (such as turbofans—in spite of their worse 
